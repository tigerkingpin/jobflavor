name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Lint Python syntax
        run: python -c "import ast; ast.parse(open('app.py').read())" && echo "Syntax OK"
      - name: Verify index.html exists
        run: python -c "open('index.html').read()" && echo "HTML OK"